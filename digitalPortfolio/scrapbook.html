<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scrapbook — Physical Collage Work</title>
    <link rel="stylesheet" href="portfolio.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href=".digitalPortfolio/index.html">
          <span class="brand-mark">DH</span>
          <span class="brand-name">Dalyn Ho</span>
        </a>
        <button id="themeBtn" class="icon-btn" type="button" aria-label="Toggle theme">☾</button>
      </div>
    </header>

    <main>

      <section class="project-hero">
        <div class="container">
          <h1>Scrapbook — Physical Collage Work</h1>
          <p class="muted">
            My biggest hobby: physical scrapbook spreads.
          </p>
          <div class="project-meta">
            <span class="tag">Hobby</span>
            <span class="tag">Composition</span>
            <span class="tag">Collage</span>
          </div>

          <div class="image-grid">
            <div class="figure">
              <img src="../images/digitalportfolio/scrap1.jpg" alt="Scrapbook spread 1" />
              <div class="cap">Scrapbook spread #1.</div>
            </div>

            <div class="figure">
              <img src="../images/digitalportfolio/scrap2.jpg" alt="Scrapbook spread 2" />
              <div class="cap">Scrapbook spread #2.</div>
            </div>

            <div class="figure">
              <img src="../images/digitalportfolio/scrap3.jpg" alt="Scrapbook spread 3" />
              <div class="cap">Scrapbook spread #3.</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">© <span id="year"></span> Dalyn Ho</p>
      </div>
    </footer>

    <script src="../portfolio.js"></script>
  </body>
</html>

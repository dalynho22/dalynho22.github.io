<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teatimewthi — Depop Logo + Branding</title>
    <link rel="stylesheet" href="portfolio.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href=".digitalPortfolio/index.html">
          <span class="brand-mark">DH</span>
          <span class="brand-name">Dalyn Ho</span>
        </a>
        <button id="themeBtn" class="icon-btn" type="button" aria-label="Toggle theme">☾</button>
      </div>
    </header>

    <main>

      <section class="project-hero">
        <div class="container">
          <h1>Teatimewthi — Depop Logo + Branding</h1>
          <p class="muted">
            Logo for a Depop clothing seller made in Canva. Main component is a tea pot bunny I painted.
          </p>
          <div class="project-meta">
            <span class="tag">Canva</span>
            <span class="tag">Logo</span>
            <span class="tag">Branding</span>
          </div>

          <div class="image-grid">
            <div class="figure">
              <img src="../images/digitalportfolio/teatimewthiDEPOP.png" alt="Teatimewthi Depop logo design" />
              <div class="cap">Primary Depop logo variation.</div>
            </div>

            <div class="figure">
              <img src="../images/digitalportfolio/teamtimewthiPFP.png" alt="Teatimewthi profile picture" />
              <div class="cap">Matching profile picture / icon version for social use.</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">© <span id="year"></span> Dalyn Ho</p>
      </div>
    </footer>

    <script src="../portfolio.js"></script>
  </body>
</html>

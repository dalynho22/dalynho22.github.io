<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Stories — Personal Story Designs</title>
    <link rel="stylesheet" href="portfolio.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="https://dalynho22.github.io/digitalPortfolio/">
          <span class="brand-mark">DH</span>
          <span class="brand-name">Dalyn Ho</span>
        </a>
        <button id="themeBtn" class="icon-btn" type="button" aria-label="Toggle theme">☾</button>
      </div>
    </header>

    <main>

      <section class="project-hero">
        <div class="container">
          <h1>Instagram Stories — Personal Story Designs</h1>
          <p class="muted">
            A set of Instagram story designs I like to create when posting.
          </p>
          <div class="project-meta">
            <span class="tag">Social</span>
            <span class="tag">Stories</span>
            <span class="tag">Layout</span>
          </div>

          <div class="image-grid">
            <div class="figure">
              <img src="../images/digitalportfolio/instaStory1.jpg" alt="Instagram Story design 1" />
              <div class="cap">Story design #1.</div>
            </div>

            <div class="figure">
              <img src="../images/digitalportfolio/instaStory2.jpg" alt="Instagram Story design 2" />
              <div class="cap">Story design #2.</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">© <span id="year"></span> Dalyn Ho</p>
      </div>
    </footer>

    <script src="../portfolio.js"></script>
